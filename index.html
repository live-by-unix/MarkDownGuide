<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Guide</title>
    <link rel="icon" type="image/png" href="/image.png">

    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }

        pre {
            background: #f5f5f5;
            padding: 1rem;
            overflow-x: auto;
            border-radius: 8px;
        }

        code {
            font-family: Consolas, monospace;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f0f0f0;
        }

        blockquote {
            border-left: 4px solid #ccc;
            margin-left: 0;
            padding-left: 1rem;
            color: #666;
        }

        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div id="content">Loading guide...</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
async function loadMarkdown() {
    try {
        const response = await fetch("guide.md");

        if (!response.ok) {
            throw new Error("Could not load guide.md");
        }

        const markdown = await response.text();

        document.getElementById("content").innerHTML =
            marked.parse(markdown);
    } catch (err) {
        document.getElementById("content").innerHTML =
            `<h2>Error</h2><p>${err.message}</p>`;
        console.error(err);
    }
}

loadMarkdown();
</script>

</body>
</html>
